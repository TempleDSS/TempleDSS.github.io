<!DOCTYPE html>
<html lang="en">
<head>
  {% include head.html %}
</head>
<body class="{{ page.body_class | default: '' }}">
  {% include header.html %}
  {% include nav.html %}

  <main>
    {{ content }}
  </main>

  {% include footer.html %}

  <script src="{{ '/assets/js/site.js' | relative_url }}"></script>
  {% if page.extra_js %}
  {% for js in page.extra_js %}
  <script src="{{ js }}"></script>
  {% endfor %}
  {% endif %}
</body>
</html>
